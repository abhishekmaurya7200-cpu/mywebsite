<!DOCTYPE html>
<html>
<head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>

body{

background:#020617;
color:white;

}

canvas{

top:0;

}

.loginBox{

input,select{

}

.sidebar{
position:fixed;

section{

<body>

<!-- LOGIN PAGE -->

<div id="loginPage">

<div class="loginBox">

<h2>Login</h2>

<input type="text" id="phone" placeholder="+91 Phone Number">

<div id="recaptcha"></div>

<button onclick="sendOTP()">Send OTP</button>

</div>

getAuth,
RecaptchaVerifier,
signInWithPhoneNumber,

} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";


const firebaseConfig = {
apiKey: "AIzaSyASVIgWqv43qsvofiRycpZsurVLOPF72zU",
authDomain: "teamnotofficial-cfb99.firebaseapp.com",
projectId: "teamnotofficial-cfb99",
appId: "1:958555695445:web:9d5249dd97a13a772f27dc"
};


const app = initializeApp(firebaseConfig);
const auth = getAuth(app);


/* reCAPTCHA */

window.recaptchaVerifier = new RecaptchaVerifier(auth,'recaptcha',{
size:'normal'
});


/* OTP SEND */

window.sendOTP=function(){

let phone=document.getElementById("phone").value;

signInWithPhoneNumber(auth,phone,window.recaptchaVerifier)

.then(function(result){

window.confirmationResult=result;

alert("OTP Sent");

})

.catch(function(error){

alert(error.message);

});

}


/* OTP VERIFY */

window.verifyOTP=function(){

let otp=document.getElementById("otp").value;

confirmationResult.confirm(otp)

.then(function(){

document.getElementById("loginPage").style.display="none";
document.getElementById("site").style.display="block";

})

.catch(function(){

alert("Wrong OTP");

});

}


/* GOOGLE LOGIN */

window.googleLogin=function(){

const provider=new GoogleAuthProvider();

signInWithPopup(auth,provider)

.then(function(){

document.getElementById("loginPage").style.display="none";
document.getElementById("site").style.display="block";

})

.catch(function(error){

alert(error.message);

});

}

</script>

</html>
